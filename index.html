<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dopple</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #111111; --white: #ffffff; --bg: #f0ede6;
      --blue: #0000e8; --font: 'Inter', sans-serif; --mono: 'Roboto Mono', monospace;
    }
    html, body { font-size: 16px; height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--black); font-family: var(--font); font-weight: 200; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* ── TYPE COLORS ── */
    :root {
      --c-articulo:  #111111;
      --c-resena:    #0000e8;
      --c-archivo:   #888888;
      --c-web:       #00aa00;
      --c-portfolio: #e80000;
    }

    /* ── NAV ── */
    .navbar { display: flex; align-items: center; padding: 0 28px; height: 64px; border-bottom: 1px solid var(--black); flex-shrink: 0; }
    .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--black); flex-shrink: 0; padding-right: 24px; border-right: 1px solid var(--black); text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-logo-text { font-size: 1.1rem; font-weight: 400; letter-spacing: -0.01em; }
    .nav-logo-reg { font-size: 0.7rem; vertical-align: super; font-weight: 300; margin-left: 1px; }
    .nav-tagline { font-size: 0.82rem; font-weight: 200; color: rgba(17,17,17,0.4); padding-left: 24px; flex: 1; letter-spacing: 0.01em; font-style: italic; }
    .nav-links { display: flex; align-items: center; }
    .nav-link { font-size: 0.82rem; font-weight: 200; color: var(--black); text-decoration: underline; padding: 0 20px; border-left: 1px solid var(--black); height: 64px; display: flex; align-items: center; transition: background 0.15s; cursor: pointer; white-space: nowrap; }
    .nav-link:hover { background: rgba(17,17,17,0.06); }
    .nav-link.contact { background: var(--black); color: var(--bg); text-decoration: none; font-weight: 300; }
    .nav-link.contact:hover { background: #333; }

    /* ── MAIN ── */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── PHOTO PANEL ── */
    .photo-panel { width: 360px; flex-shrink: 0; border-right: 1px solid var(--black); overflow: hidden; position: relative; background: #e0ddd6; }
    .photo-panel img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; position: absolute; inset: 0; transition: opacity 0.4s ease; }
    .photo-panel img.visible { opacity: 1; }

    /* ── INDEX LIST ── */
    .index-list { flex: 1; overflow-y: auto; min-height: 0; }

    /* column header */
    .index-header { display: grid; grid-template-columns: 1fr 140px 80px; align-items: center; padding: 0 28px; height: 36px; border-bottom: 1px solid var(--black); background: var(--black); color: var(--bg); }
    .index-header span { font-size: 0.6rem; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; font-family: var(--mono); }

    .index-row { display: grid; grid-template-columns: 1fr 140px 80px; align-items: center; padding: 0 28px; height: 60px; border-bottom: 1px solid rgba(17,17,17,0.15); cursor: pointer; transition: background 0.1s; text-decoration: none; color: var(--black); }
    .index-row:hover { background: rgba(0,0,232,0.08); }
    
    
    .index-row:hover .row-arrow { opacity: 1; }
    .index-row.selected { background: var(--blue); color: var(--white); }
    .index-row.selected .row-type-badge { border-color: rgba(255,255,255,0.4); color: var(--white); }
    .index-row.selected .row-year { color: rgba(255,255,255,0.7); }
    .row-read-more { display: none; font-size: 0.72rem; font-weight: 300; color: var(--white); text-decoration: none; margin-left: 10px; letter-spacing: 0.04em; border-bottom: 1px solid rgba(255,255,255,0.4); padding-bottom: 1px; }
    .index-row.selected .row-read-more { display: inline; }
    .index-row.selected { background: var(--blue); color: var(--white); }
    .index-row.selected .row-type-badge { border-color: rgba(255,255,255,0.4); color: var(--white); }
    .index-row.selected .row-year { color: rgba(255,255,255,0.8); }
    .index-row.selected .row-type-dot { opacity: 0.8; }
    .row-read-more { display: none; font-size: 0.72rem; font-weight: 300; color: var(--white); text-decoration: underline; margin-left: 12px; white-space: nowrap; letter-spacing: 0.04em; }
    .index-row.selected .row-read-more { display: inline; }
    .index-row:not(.selected):hover { background: rgba(0,0,232,0.08); }

    .row-title { font-size: clamp(0.95rem, 1.8vw, 1.25rem); font-weight: 300; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }

    .row-type-badge {
      font-size: 0.6rem; font-weight: 400; letter-spacing: 0.1em;
      text-transform: uppercase; font-family: var(--mono);
      padding: 3px 8px; border: 1px solid rgba(17,17,17,0.25);
      display: inline-flex; align-items: center; gap: 6px;
      width: fit-content; transition: border-color 0.1s, color 0.1s;
    }
    .row-type-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .dot-articulo  { background: var(--c-articulo); }
    .dot-resena    { background: var(--c-resena); }
    .dot-archivo   { background: var(--c-archivo); }
    .dot-web       { background: var(--c-web); }
    .dot-portfolio { background: var(--c-portfolio); }

    .row-year { font-size: 0.82rem; font-weight: 200; color: rgba(17,17,17,0.35); font-family: var(--mono); letter-spacing: 0.04em; transition: color 0.1s; }
    .row-arrow { opacity: 0; transition: opacity 0.1s; font-size: 0.75rem; margin-left: 4px; }

    .index-loading { padding: 48px 28px; font-size: 0.72rem; font-weight: 300; color: rgba(17,17,17,0.35); font-family: var(--mono); letter-spacing: 0.08em; }

    /* ── TYPE LEGEND ── */
    .type-legend { display: flex; align-items: center; gap: 20px; padding: 10px 28px; border-bottom: 1px solid rgba(17,17,17,0.12); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.6rem; font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(17,17,17,0.45); font-family: var(--mono); cursor: pointer; transition: color 0.15s; }
    .legend-item:hover { color: var(--black); }
    .legend-item.active { color: var(--black); }
    .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── FOOTER ── */
    .footer { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 44px; border-top: 1px solid var(--black); flex-shrink: 0; }
    .footer span, .footer a { font-size: 0.7rem; font-weight: 200; color: rgba(17,17,17,0.4); text-decoration: none; letter-spacing: 0.04em; font-family: var(--mono); }
    .footer a:hover { color: var(--black); }

    /* ── FILTERS OVERLAY ── */
    .filters-overlay { position: fixed; inset: 0; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.35s ease; }
    .filters-overlay.active { pointer-events: all; opacity: 1; }
    .filters-scrim { position: absolute; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); }
    .filters-panel { position: absolute; top: 0; left: 0; bottom: 0; width: min(780px, 88vw); background: var(--bg); border-right: 2px solid var(--black); display: flex; flex-direction: column; overflow-y: auto; transform: translateX(-100%); transition: transform 0.42s cubic-bezier(0.22,1,0.36,1); }
    .filters-overlay.active .filters-panel { transform: translateX(0); }
    .filters-panel-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 0 48px; flex: 1; padding: 52px 48px 48px; }
    .filters-title { grid-column: 1/-1; font-size: 3.2rem; font-weight: 100; margin-bottom: 48px; line-height: 1; letter-spacing: -0.02em; }
    .filter-col { display: flex; flex-direction: column; gap: 32px; }
    .filter-group-label { font-size: 0.65rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--mono); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .filter-group ul { list-style: none; }
    .filter-group ul li a { display: block; font-size: 0.9rem; font-weight: 200; color: var(--black); text-decoration: none; padding: 6px 0; border-bottom: 1px solid transparent; transition: border-color 0.15s, opacity 0.15s; }
    .filter-group ul li a:hover { border-bottom-color: var(--black); opacity: 0.5; }
    .filters-close-btn { position: sticky; bottom: 0; background: var(--black); color: var(--bg); border: none; border-top: 1px solid var(--black); font-family: var(--mono); font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; padding: 16px; cursor: pointer; width: 100%; text-align: center; transition: background 0.18s; }
    .filters-close-btn:hover { background: #333; }

    @media (max-width: 900px) { .photo-panel { display: none; } .nav-tagline { display: none; } }
    @media (max-width: 560px) { .navbar { padding: 0 16px; } .nav-link { padding: 0 14px; } .index-row { padding: 0 16px; height: 52px; grid-template-columns: 1fr 80px; } .index-row .row-type-badge { display: none; } .footer { padding: 0 16px; } .type-legend { padding: 8px 16px; } .index-header { padding: 0 16px; grid-template-columns: 1fr 80px; } .index-header span:nth-child(2) { display: none; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="admin.html" class="nav-logo">
      <img src="favicon.png" alt="dopple"/>
      <span class="nav-logo-text">dopple<span class="nav-logo-reg">®</span></span>
    </a>
    <span class="nav-tagline">*</span>
    <div class="nav-links">
      <span class="nav-link" id="filtersBtn">index</span>
      <a href="/cdn-cgi/l/email-protection#dbbfb4ababb7beb6aea8b2b89bbcb6bab2b7f5b8b4b6" class="nav-link contact">get in contact &gt;</a>
    </div>
  </nav>

  <div class="filters-overlay" id="filtersOverlay">
    <div class="filters-scrim" id="filtersScrim"></div>
    <div class="filters-panel">
      <div class="filters-panel-inner">
        <h1 class="filters-title">Index</h1>
        <div class="filter-col">
          <div class="filter-group">
            <div class="filter-group-label"><span class="legend-dot" style="background:var(--c-articulo)"></span> artículo</div>
            <ul id="filter-articulo"></ul>
          </div>
          <div class="filter-group">
            <div class="filter-group-label"><span class="legend-dot" style="background:var(--c-resena)"></span> reseña</div>
            <ul id="filter-resena"></ul>
          </div>
          <div class="filter-group">
            <div class="filter-group-label"><span class="legend-dot" style="background:var(--c-archivo)"></span> archivo</div>
            <ul id="filter-archivo"></ul>
          </div>
        </div>
        <div class="filter-col">
          <div class="filter-group">
            <div class="filter-group-label"><span class="legend-dot" style="background:var(--c-web)"></span> página web</div>
            <ul id="filter-web"></ul>
          </div>
          <div class="filter-group">
            <div class="filter-group-label"><span class="legend-dot" style="background:var(--c-portfolio)"></span> portfolio</div>
            <ul id="filter-portfolio"></ul>
          </div>
        </div>
      </div>
      <button class="filters-close-btn" id="filtersClose">CLOSE  ✕</button>
    </div>
  </div>

  <div class="main">
    <div class="photo-panel" id="photoPanel"></div>
    <div class="index-list" id="indexList">

      <div class="type-legend" id="typeLegend">
        <span class="legend-item active" data-filter="all"><span class="legend-dot" style="background:var(--black)"></span> todos</span>
        <span class="legend-item" data-filter="articulo"><span class="legend-dot dot-articulo"></span> artículo</span>
        <span class="legend-item" data-filter="resena"><span class="legend-dot dot-resena"></span> reseña</span>
        <span class="legend-item" data-filter="archivo"><span class="legend-dot dot-archivo"></span> archivo</span>
        <span class="legend-item" data-filter="web"><span class="legend-dot dot-web"></span> web</span>
        <span class="legend-item" data-filter="portfolio"><span class="legend-dot dot-portfolio"></span> portfolio</span>
      </div>

      <div class="index-header">
        <span>título</span>
        <span>tipo</span>
        <span>año</span>
      </div>

      <div id="rowsContainer">
        <div class="index-loading">loading…</div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <span>Buenos Aires, Argentina.</span>
    <span>dopple.</span>
    <span>EST 2024</span>
  </footer>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    const TYPE_DOTS = { articulo:'dot-articulo', resena:'dot-resena', archivo:'dot-archivo', web:'dot-web', portfolio:'dot-portfolio' };
    const TYPE_LABELS = { articulo:'artículo', resena:'reseña', archivo:'archivo', web:'página web', portfolio:'portfolio' };

    async function loadEntries() {
      try {
        const res = await fetch('/api/entries');
        if (!res.ok) throw new Error();
        return await res.json();
      } catch {
        const db = JSON.parse(localStorage.getItem('dopple_db') || 'null');
        if (db?.entries) return db.entries.filter(e => e.status === 'published');
        return [];
      }
    }

    /* ── PHOTO ── */
    const photoPanel = document.getElementById('photoPanel');
    let currentSrc = 'paris.jpg';

    function showPhoto(src) {
      if (!src) { src = 'paris.jpg'; }
      if (src === currentSrc) return;
      currentSrc = src;
      const img = new Image();
      img.src = src;
      img.onload = () => {
        Array.from(photoPanel.querySelectorAll('img')).forEach(i => i.remove());
        photoPanel.appendChild(img);
        requestAnimationFrame(() => img.classList.add('visible'));
      };
    }

    function clearPhoto() {
      showPhoto('paris.jpg');
    }

    /* ── RENDER ── */
    let allEntries = [];
    let activeFilter = 'all';

    let selectedRow = null;

    function selectRow(row) {
      if (selectedRow) selectedRow.classList.remove('selected');
      selectedRow = row;
      row.classList.add('selected');
      showPhoto(row.dataset.cover);
    }

    function renderRows(entries) {
      const container = document.getElementById('rowsContainer');
      const filtered = activeFilter === 'all' ? entries : entries.filter(e => e.postType === activeFilter);

      if (!filtered.length) {
        container.innerHTML = `<div class="index-loading">no entries found</div>`;
        return;
      }

      container.innerHTML = filtered.map(e => {
        const pt = e.postType || 'articulo';
        const dot = TYPE_DOTS[pt] || 'dot-articulo';
        const label = TYPE_LABELS[pt] || pt;
        return `
          <div class="index-row" data-href="article.html?id=${e.id}" data-cover="${e.cover||''}">
            <span class="row-title">${e.title}</span>
            <span class="row-type-badge">
              <span class="row-type-dot ${dot}"></span>
              ${label}
            </span>
            <span class="row-year">
              ${e.year||''}
              <a class="row-read-more" href="article.html?id=${e.id}">read more →</a>
            </span>
          </div>`;
      }).join('');

      container.querySelectorAll('.index-row').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('.row-read-more')) return;
          selectRow(row);
        });
      });

      const first = container.querySelector('.index-row');
      if (first) selectRow(first);
    }

    /* ── FILTERS LEGEND ── */
    document.getElementById('typeLegend').addEventListener('click', e => {
      const item = e.target.closest('.legend-item');
      if (!item) return;
      document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      activeFilter = item.dataset.filter;
      renderRows(allEntries);
    });

    /* ── POPULATE FILTER PANEL ── */
    function populateFilters(entries) {
      ['articulo','resena','archivo','web','portfolio'].forEach(type => {
        const ul = document.getElementById('filter-' + type);
        if (!ul) return;
        const filtered = entries.filter(e => e.postType === type);
        ul.innerHTML = filtered.length
          ? filtered.map(e => `<li><a href="article.html?id=${e.id}">${e.title} — ${e.year||''}</a></li>`).join('')
          : `<li style="font-size:0.8rem;color:#aaa;padding:4px 0;">no entries</li>`;
      });
    }

    /* ── BOOT ── */
    (async () => {
      allEntries = await loadEntries();
      renderRows(allEntries);
      populateFilters(allEntries);

    })();

    /* ── OVERLAY ── */
    document.getElementById('filtersBtn').addEventListener('click', () => document.getElementById('filtersOverlay').classList.add('active'));
    document.getElementById('filtersClose').addEventListener('click', () => document.getElementById('filtersOverlay').classList.remove('active'));
    document.getElementById('filtersScrim').addEventListener('click', () => document.getElementById('filtersOverlay').classList.remove('active'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('filtersOverlay').classList.remove('active'); });
  </script>
</body>
</html>
