<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dopple</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #111111; --white: #ffffff; --bg: #f0ede6;
      --blue: #0000e8; --font: 'Inter', sans-serif; --mono: 'Roboto Mono', monospace;
    }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--black); font-family: var(--font); font-weight: 200; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }

    /* NAV */
    .navbar { display: flex; align-items: center; padding: 0 28px; height: 64px; border-bottom: 1px solid var(--black); flex-shrink: 0; }
    .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--black); flex-shrink: 0; padding-right: 24px; border-right: 1px solid var(--black); text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-logo-text { font-size: 1.1rem; font-weight: 400; letter-spacing: -0.01em; }
    .nav-logo-reg { font-size: 0.7rem; vertical-align: super; font-weight: 300; margin-left: 1px; }
    .nav-tagline { font-size: 0.82rem; font-weight: 200; color: rgba(17,17,17,0.45); padding-left: 24px; flex: 1; letter-spacing: 0.01em; }
    .nav-links { display: flex; align-items: center; }
    .nav-link { font-size: 0.82rem; font-weight: 200; color: var(--black); text-decoration: underline; padding: 0 20px; border-left: 1px solid var(--black); height: 64px; display: flex; align-items: center; transition: background 0.15s; cursor: pointer; }
    .nav-link:hover { background: rgba(17,17,17,0.05); }
    .nav-link.contact { background: var(--blue); color: var(--white); text-decoration: none; font-weight: 300; }
    .nav-link.contact:hover { background: #0000cc; }

    /* MAIN */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* PHOTO PANEL */
    .photo-panel { width: 340px; flex-shrink: 0; border-right: 1px solid var(--black); overflow: hidden; position: relative; background: #1a1a1a; }
    .photo-panel img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; position: absolute; inset: 0; transition: opacity 0.35s ease; }
    .photo-panel img.visible { opacity: 1; }

    /* INDEX LIST */
    .index-list { flex: 1; overflow-y: auto; }
    .index-row { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 0 28px; height: 64px; border-bottom: 1px solid var(--black); cursor: pointer; transition: background 0.12s; text-decoration: none; color: var(--black); }
    .index-row:hover { background: var(--blue); color: var(--white); }
    .index-row:hover .row-meta { color: var(--white); opacity: 1; }
    .index-row:hover .row-year { color: var(--white); }
    .index-row:hover .row-action { opacity: 1; }
    .row-left { display: flex; align-items: baseline; gap: 20px; min-width: 0; }
    .row-title { font-size: clamp(1rem, 2.2vw, 1.45rem); font-weight: 300; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { font-size: 0.72rem; font-weight: 300; color: rgba(17,17,17,0.35); letter-spacing: 0.06em; white-space: nowrap; display: flex; align-items: center; gap: 10px; transition: color 0.12s; }
    .row-sep { opacity: 0.4; }
    .row-action { font-size: 0.72rem; font-weight: 300; opacity: 0; transition: opacity 0.12s; letter-spacing: 0.04em; }
    .row-year { font-size: clamp(1rem, 2.2vw, 1.45rem); font-weight: 200; color: rgba(17,17,17,0.35); letter-spacing: -0.01em; flex-shrink: 0; transition: color 0.12s; }
    .index-loading { padding: 48px 28px; font-size: 0.72rem; font-weight: 300; color: rgba(17,17,17,0.35); font-family: var(--mono); letter-spacing: 0.08em; }

    /* FOOTER */
    .footer { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 44px; border-top: 1px solid var(--black); flex-shrink: 0; }
    .footer span, .footer a { font-size: 0.72rem; font-weight: 200; color: rgba(17,17,17,0.45); text-decoration: none; letter-spacing: 0.04em; }
    .footer a:hover { color: var(--black); }

    /* FILTERS */
    .filters-overlay { position: fixed; inset: 0; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.35s ease; }
    .filters-overlay.active { pointer-events: all; opacity: 1; }
    .filters-scrim { position: absolute; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); }
    .filters-panel { position: absolute; top: 0; left: 0; bottom: 0; width: min(780px, 88vw); background: var(--bg); border-right: 2px solid var(--black); box-shadow: 16px 0 60px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow-y: auto; transform: translateX(-100%); transition: transform 0.42s cubic-bezier(0.22,1,0.36,1); }
    .filters-overlay.active .filters-panel { transform: translateX(0); }
    .filters-panel-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 0 48px; flex: 1; padding: 52px 48px 48px; }
    .filters-title { grid-column: 1/-1; font-size: 3.2rem; font-weight: 100; margin-bottom: 48px; line-height: 1; letter-spacing: -0.02em; }
    .filter-col { display: flex; flex-direction: column; gap: 32px; }
    .filter-group .tag { margin-bottom: 12px; }
    .filter-group ul { list-style: none; }
    .filter-group ul li a { display: block; font-size: 0.9rem; font-weight: 200; color: var(--black); text-decoration: none; padding: 6px 0; border-bottom: 1px solid transparent; transition: border-color 0.15s, opacity 0.15s; }
    .filter-group ul li a:hover { border-bottom-color: var(--black); opacity: 0.5; }
    .filters-close-btn { position: sticky; bottom: 0; background: #00e800; color: var(--black); border: none; border-top: 2px solid var(--black); font-family: var(--font); font-size: 0.75rem; font-weight: 400; letter-spacing: 0.08em; padding: 16px; cursor: pointer; width: 100%; text-align: center; transition: background 0.18s; }
    .filters-close-btn:hover { background: #00cc00; }
    .tag { display: inline-block; font-size: 0.68rem; font-weight: 300; padding: 2px 6px; border: 1px solid var(--black); white-space: nowrap; }
    .tag-yellow  { background: #f0f000; color: var(--black); }
    .tag-magenta { background: #e800e8; color: var(--black); }
    .tag-blue    { background: #0000e8; color: var(--white); }
    .tag-red     { background: #e80000; color: var(--white); }
    .tag-cyan    { background: #00fff7; color: var(--black); }

    @media (max-width: 860px) { .photo-panel { display: none; } .nav-tagline { display: none; } }
    @media (max-width: 560px) { .navbar { padding: 0 16px; } .nav-link { padding: 0 14px; } .index-row { padding: 0 16px; height: 56px; } .footer { padding: 0 16px; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="admin.html" class="nav-logo">
      <img src="favicon.png" alt="dopple"/>
      <span class="nav-logo-text">dopple<span class="nav-logo-reg">®</span></span>
    </a>
    <span class="nav-tagline">*</span>
    <div class="nav-links">
      <span class="nav-link" id="filtersBtn">index</span>
      <a href="mailto:dopplemusic@gmail.com" class="nav-link contact">get in contact &gt;</a>
    </div>
  </nav>

  <div class="filters-overlay" id="filtersOverlay">
    <div class="filters-scrim" id="filtersScrim"></div>
    <div class="filters-panel">
      <div class="filters-panel-inner">
        <h1 class="filters-title">Index</h1>
        <div class="filter-col">
          <div class="filter-group"><span class="tag tag-yellow">editorial</span><ul id="filter-editorial"></ul></div>
          <div class="filter-group"><span class="tag tag-magenta">photography</span><ul id="filter-photography"></ul></div>
          <div class="filter-group"><span class="tag tag-red">music</span><ul id="filter-music"></ul></div>
        </div>
        <div class="filter-col">
          <div class="filter-group"><span class="tag tag-blue">article</span><ul id="filter-article"></ul></div>
          <div class="filter-group"><span class="tag tag-cyan">video</span><ul id="filter-video"></ul></div>
        </div>
      </div>
      <button class="filters-close-btn" id="filtersClose">CLOSE  ✕</button>
    </div>
  </div>

  <div class="main">
    <div class="photo-panel" id="photoPanel"></div>
    <div class="index-list" id="indexList">
      <div class="index-loading">loading…</div>
    </div>
  </div>

  <footer class="footer">
    <span>Buenos Aires, Argentina.</span>
    <span>dopple.</span>
    <span>EST 2024</span>
  </footer>

  <script>
    async function loadEntries() {
      try {
        const res = await fetch('/api/entries');
        if (!res.ok) throw new Error();
        return await res.json();
      } catch {
        const db = JSON.parse(localStorage.getItem('dopple_db') || 'null');
        if (db?.entries) return db.entries.filter(e => e.status === 'published');
        return [];
      }
    }

    const photoPanel = document.getElementById('photoPanel');
    let currentSrc = null;

    function showPhoto(src) {
      if (!src || src === currentSrc) return;
      currentSrc = src;
      const img = new Image();
      img.src = src;
      img.onload = () => {
        Array.from(photoPanel.querySelectorAll('img')).forEach(i => i.remove());
        photoPanel.appendChild(img);
        requestAnimationFrame(() => img.classList.add('visible'));
      };
    }

    function clearPhoto() {
      currentSrc = null;
      Array.from(photoPanel.querySelectorAll('img')).forEach(i => {
        i.classList.remove('visible');
        setTimeout(() => i.remove(), 380);
      });
    }

    function renderList(entries) {
      const list = document.getElementById('indexList');
      if (!entries.length) {
        list.innerHTML = `<div class="index-loading">no published entries yet — <a href="admin.html" style="color:var(--blue)">go to admin</a></div>`;
        return;
      }
      list.innerHTML = entries.map(e => `
        <a class="index-row" href="article.html?id=${e.id}" data-cover="${e.cover||''}">
          <div class="row-left">
            <span class="row-title">${e.title}</span>
            <span class="row-meta">
              <span>${e.type||''}</span>
              <span class="row-sep">I</span>
              <span>${e.year||''}</span>
              <span class="row-sep">I</span>
              <span class="row-action">read more &gt;</span>
            </span>
          </div>
          <span class="row-year">${e.year||''}</span>
        </a>`).join('');

      list.querySelectorAll('.index-row').forEach(row => {
        row.addEventListener('mouseenter', () => showPhoto(row.dataset.cover));
        row.addEventListener('mouseleave', clearPhoto);
      });
    }

    function populateFilters(entries) {
      ['editorial','photography','article','music','video'].forEach(type => {
        const ul = document.getElementById('filter-' + type);
        if (!ul) return;
        const filtered = entries.filter(e => e.type === type || (e.tags||[]).includes(type));
        ul.innerHTML = filtered.length
          ? filtered.map(e => `<li><a href="article.html?id=${e.id}">${e.title} — ${e.year||''}</a></li>`).join('')
          : `<li style="font-size:0.8rem;color:#aaa;padding:4px 0;">no entries</li>`;
      });
    }

    (async () => {
      const entries = await loadEntries();
      renderList(entries);
      populateFilters(entries);
    })();

    document.getElementById('filtersBtn').addEventListener('click', () => document.getElementById('filtersOverlay').classList.add('active'));
    document.getElementById('filtersClose').addEventListener('click', () => document.getElementById('filtersOverlay').classList.remove('active'));
    document.getElementById('filtersScrim').addEventListener('click', () => document.getElementById('filtersOverlay').classList.remove('active'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('filtersOverlay').classList.remove('active'); });
  </script>
</body>
</html>
