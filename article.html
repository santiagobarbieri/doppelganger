<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dopple®</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000;
      --white: #fff;
      --muted: rgba(255, 255, 255, 0.56);
      --faint: rgba(255, 255, 255, 0.14);
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html {
      background: var(--black);
      color: var(--white);
      font-size: 16px;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      font-weight: 300;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(920px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 28px;
      font-size: 0.72rem;
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .logo {
      color: var(--white);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      text-transform: none;
    }

    .logo span {
      font-size: 0.5rem;
      opacity: 0.5;
      vertical-align: super;
    }

    .back {
      transition: color 0.15s ease;
    }

    .back:hover {
      color: var(--white);
    }

    .banner {
      display: none;
      width: 100%;
      height: clamp(220px, 44vw, 460px);
      margin-bottom: 36px;
      object-fit: cover;
      background: #111;
    }

    .banner.visible {
      display: block;
    }

    .eyebrow {
      margin-bottom: 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .title {
      max-width: 780px;
      color: var(--white);
      font-size: clamp(2.2rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 0.96;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 24px 0 40px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .meta span:not(:last-child)::after {
      content: '/';
      margin-left: 10px;
      color: rgba(255, 255, 255, 0.28);
    }

    .intro {
      display: none;
      max-width: 720px;
      margin-bottom: 36px;
      padding-bottom: 34px;
      border-bottom: 1px solid var(--faint);
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      font-style: italic;
      line-height: 1.65;
    }

    .intro.visible {
      display: block;
    }

    .content {
      max-width: 720px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 1.02rem;
      line-height: 1.85;
    }

    .content > * + * {
      margin-top: 1.35em;
    }

    .content h1,
    .content h2,
    .content h3 {
      margin-top: 2.1em;
      color: var(--white);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .content h1 { font-size: 2rem; }
    .content h2 { font-size: 1.55rem; }
    .content h3 { font-size: 1.2rem; }

    .content a {
      color: var(--white);
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.4);
      text-underline-offset: 4px;
    }

    .content ul,
    .content ol {
      padding-left: 1.3em;
    }

    .content li + li {
      margin-top: 0.45em;
    }

    .content blockquote {
      border-left: 1px solid rgba(255, 255, 255, 0.4);
      color: rgba(255, 255, 255, 0.68);
      font-style: italic;
      padding-left: 20px;
    }

    .content code {
      background: rgba(255, 255, 255, 0.1);
      font-family: var(--mono);
      font-size: 0.9em;
      padding: 2px 5px;
    }

    .content pre {
      overflow-x: auto;
      padding: 18px;
      background: rgba(255, 255, 255, 0.08);
    }

    .content pre code {
      background: transparent;
      padding: 0;
    }

    .content img {
      display: block;
      width: 100%;
    }

    .footer {
      margin-top: 72px;
      padding-top: 24px;
      border-top: 1px solid var(--faint);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .state {
      min-height: 60vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 28px, 920px);
        padding-top: 20px;
      }

      .topbar {
        padding-bottom: 22px;
      }

      .banner {
        margin-bottom: 28px;
      }

      .title {
        letter-spacing: -0.055em;
      }

      .meta {
        margin-bottom: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar">
      <a href="index.html" class="logo">dopple<span>®</span></a>
      <a href="index.html" class="back" data-smart-back>back</a>
    </nav>

    <div id="state" class="state">loading</div>

    <article id="article" hidden>
      <img id="banner" class="banner" src="" alt="">
      <p id="eyebrow" class="eyebrow"></p>
      <h1 id="title" class="title"></h1>
      <div id="meta" class="meta"></div>
      <p id="intro" class="intro"></p>
      <div id="content" class="content"></div>
    </article>

    <footer class="footer">
      <a href="index.html" data-smart-back>back</a>
    </footer>
  </main>

  <script>
    const SITE_BACK_URLS = {
      dopple: 'index.html',
      astrak: 'https://astrak.netlify.app/about.html',
    };

    let backFallbackUrl = SITE_BACK_URLS.dopple;

    function getSiteBackUrl(site) {
      if (!site) return '';
      return SITE_BACK_URLS[String(site).toLowerCase()] || '';
    }

    function getBackUrlFromParams() {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref') || params.get('returnTo') || params.get('return');
      const site = params.get('site') || params.get('from');

      if (ref) return ref;
      return getSiteBackUrl(site);
    }

    function getBackUrlFromReferrer() {
      if (!document.referrer || document.referrer === window.location.href) return '';

      try {
        const referrerUrl = new URL(document.referrer);
        if (referrerUrl.hostname.includes('astrak.netlify.app')) return SITE_BACK_URLS.astrak;
      } catch (error) {
        return document.referrer;
      }

      return document.referrer;
    }

    function getBackFallbackFromEntry(entry) {
      const sites = Array.isArray(entry.sites) ? entry.sites : [];
      const nonDoppleSite = sites.find(site => site !== 'dopple');
      return getSiteBackUrl(nonDoppleSite) || getSiteBackUrl(sites[0]) || SITE_BACK_URLS.dopple;
    }

    function goBack(event) {
      event.preventDefault();

      const explicitBackUrl = getBackUrlFromParams();
      if (explicitBackUrl) {
        window.location.href = explicitBackUrl;
        return;
      }

      const referrerBackUrl = getBackUrlFromReferrer();
      if (referrerBackUrl) {
        window.location.href = referrerBackUrl;
        return;
      }

      window.location.href = backFallbackUrl;
    }

    document.addEventListener('click', event => {
      const link = event.target.closest('[data-smart-back]');
      if (link) goBack(event);
    });

    function renderEntry(entry) {
      document.title = `${entry.title} - dopple®`;
      backFallbackUrl = getBackFallbackFromEntry(entry);

      const banner = document.getElementById('banner');
      const meta = document.getElementById('meta');
      const intro = document.getElementById('intro');
      const content = document.getElementById('content');

      document.getElementById('eyebrow').textContent = entry.postType || entry.type || 'update';
      document.getElementById('title').textContent = entry.title || 'Untitled';

      if (entry.cover) {
        banner.src = entry.cover;
        banner.alt = entry.title || '';
        banner.classList.add('visible');
      }

      const metaItems = [entry.author, entry.year, entry.technologies].filter(Boolean);
      meta.replaceChildren(...metaItems.map(item => {
        const span = document.createElement('span');
        span.textContent = item;
        return span;
      }));

      if (entry.excerpt) {
        intro.textContent = entry.excerpt;
        intro.classList.add('visible');
      }

      content.innerHTML = entry.body ? marked.parse(entry.body) : '<p>No version notes available.</p>';

      document.getElementById('state').remove();
      document.getElementById('article').hidden = false;
    }

    (async () => {
      const id = parseInt(new URLSearchParams(window.location.search).get('id'), 10);
      if (!id) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch('/api/entries');
        const all = await res.json();
        const entry = all.find(item => item.id === id);

        if (!entry) {
          window.location.href = 'index.html';
          return;
        }

        renderEntry(entry);
      } catch (error) {
        document.getElementById('state').innerHTML = '<a href="index.html" data-smart-back>error loading - go back</a>';
      }
    })();
  </script>
</body>
</html>
